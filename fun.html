<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Just for Fun | Lydia Chung</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="fun.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <nav class="nav">
        <a href="index.html" class="nav-link">HOME</a>
        <a href="corporate.html" class="nav-link">CORPORATE</a>
        <a href="education.html" class="nav-link">EDUCATION</a>
        <a href="fun.html" class="nav-link active">FUN</a>
      </nav>
    </header>

    <main class="fun-page">
      <section class="hero-section">
        <h1 class="page-title">JUST FOR FUN</h1>

        <div class="hero-grid">
          <div class="photo-wrap align-center">
            <div class="octagon-frame octagon-tall hero-photo">
              <img src="images/c3auditions.jpg" alt="Lydia with friends after dance" />
            </div>
          </div>

          <div class="hero-copy">
            <h2 class="section-title">DANCE IN<br />ENTERTAINMENT MINOR</h2>

            <div class="video-card">
              <div class="video-shell">
                <iframe width="560" height="315" src="https://www.youtube.com/embed/TCIgd4LvbR8?si=6-0rt87CcrnDBWJA" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="collage-section dance-collage-section">
        <div class="dance-collage">
          <div class="octagon-frame octagon-large collage-item dance-left" data-depth="2">
            <img src="images/sigchitalentshow.jpg" alt="Dance performance outdoors" />
          </div>

          <div class="octagon-frame octagon-medium collage-item dance-top" data-depth="3">
            <img src="images/hiphopfinal.png" alt="Hiphop final in studio" />
          </div>

          <div class="octagon-frame octagon-xlarge collage-item dance-right" data-depth="1">
            <img src="images/bollywood.jpg" alt="Bollywood group photo outside" />
          </div>

          <div class="video-card collage-item dance-bottom-video" data-depth="0">
            <div class="video-shell video-shell-small">
              <iframe src="https://drive.google.com/file/d/1MDRkRbe144tz5xdRRV__EAhm9UKi9ZHD/preview" width="640" height="480"></iframe>
            </div>
          </div>
        </div>
      </section>

      <section class="fun-block">
        <h2 class="section-title centered-title">BALLOON TWISTING</h2>

        <div class="hex-gallery balloon-gallery">
          <div class="octagon-frame octagon-tall gallery-a"><img src="images/balloon-1.jpg" alt="Balloon twisting at Shipgarten" /></div>
          <div class="octagon-frame octagon-medium gallery-b"><img src="images/balloon-2.jpg" alt="Balloon dinosaurs" /></div>
          <div class="octagon-frame octagon-medium gallery-c"><img src="images/balloon-3.jpg" alt="Balloon chameleon" /></div>
          <div class="octagon-frame octagon-tall gallery-d"><img src="images/balloon-4.jpg" alt="Balloon octopus column" /></div>
          <div class="octagon-frame octagon-medium gallery-e"><img src="images/balloon-5.jpg" alt="Balloon Pokemon" /></div>
          <div class="octagon-frame octagon-medium gallery-f"><img src="images/balloon-6.jpg" alt="Balloon twisting at 4th in the Park" /></div>
          <div class="octagon-frame octagon-medium gallery-g"><img src="images/balloon-7.jpg" alt="Children holding balloon wands" /></div>
        </div>
      </section>

      <section class="fun-block jubilee-section">
        <div class="jubilee-grid">
          <div class="jubilee-stack">
            <div class="octagon-frame octagon-tall jubilee-main"><img src="images/jubilee-1.jpg" alt="Fake pregnancy belly for Jubilee" /></div>
            <div class="octagon-frame octagon-medium jubilee-side"><img src="images/jubilee-2.jpg" alt="Heading into the Jubilee set" /></div>
          </div>

          <div class="jubilee-copy">
            <h2 class="section-title">FILMING WITH JUBILEE</h2>

            <div class="video-card">
              <div class="video-shell">
                <iframe width="560" height="315" src="https://www.youtube.com/embed/z3zrg1t61bo?si=koGohbGDvUu_kM_m" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="fun-block">
        <h2 class="section-title centered-title">ARTS &amp; CRAFTS</h2>

        <div class="hex-gallery crafts-gallery">
          <div class="octagon-frame octagon-tall gallery-a"><img src="images/crafts-1.jpg" alt="Valentine's doodles" /></div>
          <div class="octagon-frame octagon-medium gallery-b"><img src="images/crafts-2.jpg" alt="Paper craft supplies" /></div>
          <div class="octagon-frame octagon-medium gallery-c"><img src="images/crafts-3.jpg" alt="Origami fortune gods" /></div>
          <div class="octagon-frame octagon-tall gallery-d"><img src="images/crafts-4.jpg" alt="3D printed spray paint stencil" /></div>
          <div class="octagon-frame octagon-medium gallery-e"><img src="images/crafts-5.jpg" alt="Yin yang ceramic bowl" /></div>
          <div class="octagon-frame octagon-medium gallery-f"><img src="images/crafts-6.jpg" alt="Paper mache pig" /></div>
          <div class="octagon-frame octagon-medium gallery-g"><img src="images/crafts-7.jpg" alt="Ceramic pig decoration" /></div>
        </div>
      </section>

      <section class="fun-block skydiving-section">
        <div class="skydiving-grid">
          <div class="skydiving-copy">
            <h2 class="section-title">INDOOR SKYDIVING</h2>

            <div class="rect-photo rect-photo-large">
              <img src="images/skydiving-1.jpg" alt="Indoor skydiving action shot" />
            </div>
          </div>

          <div class="skydiving-stack">
            <div class="octagon-frame octagon-tall sky-top"><img src="images/skydiving-2.jpg" alt="Lydia in indoor skydiving suit" /></div>
            <div class="octagon-frame octagon-medium sky-bottom"><img src="images/skydiving-3.jpg" alt="Indoor skydiving certificate" /></div>
          </div>
        </div>
      </section>

      <section class="fun-block baking-animals-section">
        <div class="dual-grid">
          <div class="dual-column">
            <h2 class="section-title">BAKING &amp;</h2>
            <div class="dual-collage baking-collage">
              <div class="octagon-frame octagon-tall left-top"><img src="images/baking-1.jpg" alt="Frosted brownie bites" /></div>
              <div class="octagon-frame octagon-tall right-main"><img src="images/baking-2.jpg" alt="Chocolate macarons and tea" /></div>
              <div class="octagon-frame octagon-medium left-bottom"><img src="images/baking-3.jpg" alt="Pig cake" /></div>
            </div>
          </div>

          <div class="dual-column animals-column">
            <div class="dual-collage animals-collage">
              <div class="octagon-frame octagon-tall left-main"><img src="images/animals-1.jpg" alt="Cats cuddling" /></div>
              <div class="octagon-frame octagon-tall right-main"><img src="images/animals-2.jpg" alt="Horse" /></div>
              <div class="octagon-frame octagon-small bottom-center"><img src="images/animals-3.jpg" alt="Dog walking" /></div>
            </div>
            <h2 class="section-title animals-title">ANIMALS</h2>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 Lydia Chung</p>
    </footer>
  </div>
</body>
</html>
